services:
  - type: web
    name: tradesignal-backend
    runtime: python
    plan: starter
    region: singapore
    branch: main
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: JWT_SECRET_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        value: app/firebase/service_account.json
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: ANGEL_ONE_API_KEY
        sync: false
      - key: ANGEL_ONE_CLIENT_ID
        sync: false
      - key: ANGEL_ONE_PASSWORD
        sync: false
      - key: ANGEL_ONE_TOTP_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: '["https://your-frontend-domain.com"]'
